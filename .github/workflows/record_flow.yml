name: Record HL per-account flow

# Forward-records the Hyperliquid per-account trade tape (free, no server) by running
# crypto_pulse/record_trades_l4.py and persisting Parquet shards to a dedicated
# `flow-data` branch (keeps main clean).
#
# Repo is PUBLIC => Actions are free/unlimited on standard runners, so we record
# NEAR-CONTINUOUSLY: a job every 6h records ~5h45m (jobs cap at 6h), chaining for
# ~96% coverage. Handoff gaps/overlaps are harmless (flow_l4 dedups on tid).
#
# Activation: scheduled workflows only fire from the DEFAULT branch (main). Trigger
# manually any time via "Run workflow" (workflow_dispatch).

on:
  schedule:
    - cron: '2 */6 * * *'    # 00:02, 06:02, 12:02, 18:02 UTC — chained ~5h45m jobs
  workflow_dispatch:
    inputs:
      secs:
        description: Seconds to record
        default: '20700'
      coins:
        description: Comma-separated coins
        default: 'AAVE,ADA,ALGO,APT,AR,ARB,ATOM,AVAX,AXS,BCH,BNB,BTC,COMP,CRV,DOGE,DOT,DYDX,ETC,ETH,FIL,GALA,HBAR,INJ,JUP,KAS,LINK,LTC,MKR,NEAR,OP,PYTH,RUNE,SAND,SEI,SNX,SOL,STX,SUI,TIA,TRX,UNI,XLM,XMR,XRP,ZEC'

permissions:
  contents: write

concurrency:
  group: record-hl-flow
  cancel-in-progress: false

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 354
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install websocket-client pandas pyarrow

      - name: Record per-account trade tape
        env:
          PYTHONUNBUFFERED: '1'
        run: |
          python crypto_pulse/record_trades_l4.py \
            --secs "${{ github.event.inputs.secs || '20700' }}" \
            --coins "${{ github.event.inputs.coins || 'AAVE,ADA,ALGO,APT,AR,ARB,ATOM,AVAX,AXS,BCH,BNB,BTC,COMP,CRV,DOGE,DOT,DYDX,ETC,ETH,FIL,GALA,HBAR,INJ,JUP,KAS,LINK,LTC,MKR,NEAR,OP,PYTH,RUNE,SAND,SEI,SNX,SOL,STX,SUI,TIA,TRX,UNI,XLM,XMR,XRP,ZEC' }}"

      - name: Publish shards to flow-data branch
        run: |
          set -e
          ls data/hl_trades_l4/*.parquet >/dev/null 2>&1 || { echo "no shards recorded"; exit 0; }
          mkdir -p /tmp/shards && cp data/hl_trades_l4/*.parquet /tmp/shards/
          cp crypto_pulse/merge_shards.py /tmp/merge_shards.py
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin flow-data >/dev/null 2>&1; then
            git fetch origin flow-data
            git checkout -B flow-data origin/flow-data
          else
            git checkout --orphan flow-data
            git rm -rf . >/dev/null 2>&1 || true
            echo "# HL per-account flow shards (recorded by record-hl-flow workflow)" > README.md
          fi
          mkdir -p shards
          # merge new shards into the branch, deduping on tid (handles handoff overlap)
          python /tmp/merge_shards.py /tmp/shards shards
          git add shards README.md
          if git diff --staged --quiet; then
            echo "nothing new to commit"
          else
            git commit -m "flow shards $(date -u +%Y-%m-%dT%H:%MZ)"
            git push origin flow-data
          fi
