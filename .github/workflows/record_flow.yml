name: Record HL per-account flow

# Forward-records the Hyperliquid per-account trade tape (free, no server) by running
# crypto_pulse/record_trades_l4.py on a schedule and persisting Parquet shards to a
# dedicated `flow-data` branch (keeps main clean). The daily cross-sectional flow
# features are normalised ratios, so a few short sampled windows per day are enough.
#
# Budget (private repo, free tier = ~2000 min/mo): 3 runs/day x ~18 min ~= 1800 min/mo.
# On a public repo or paid plan, raise SECS or add cron rows for fuller coverage.
#
# Activation: scheduled workflows only fire from the DEFAULT branch (main), so this
# must be merged to main to start recording. Trigger manually any time via the
# "Run workflow" button (workflow_dispatch) to test or top up.

on:
  schedule:
    - cron: '7 1 * * *'     # sample three different times of day to avoid TOD bias
    - cron: '7 9 * * *'
    - cron: '7 17 * * *'
  workflow_dispatch:
    inputs:
      secs:
        description: Seconds to record
        default: '1080'
      coins:
        description: Comma-separated coins
        default: 'BTC,ETH,SOL,DOGE,AVAX,XRP,LINK,BNB,LTC,ARB,OP,APT,SUI,TIA,SEI,WIF,PEPE,NEAR,INJ,TAO'

permissions:
  contents: write

concurrency:
  group: record-hl-flow
  cancel-in-progress: false

jobs:
  record:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install websocket-client pandas pyarrow

      - name: Record per-account trade tape
        env:
          PYTHONUNBUFFERED: '1'
        run: |
          python crypto_pulse/record_trades_l4.py \
            --secs "${{ github.event.inputs.secs || '1080' }}" \
            --coins "${{ github.event.inputs.coins || 'BTC,ETH,SOL,DOGE,AVAX,XRP,LINK,BNB,LTC,ARB,OP,APT,SUI,TIA,SEI,WIF,PEPE,NEAR,INJ,TAO' }}"

      - name: Publish shards to flow-data branch
        run: |
          set -e
          ls data/hl_trades_l4/*.parquet >/dev/null 2>&1 || { echo "no shards recorded"; exit 0; }
          mkdir -p /tmp/shards && cp data/hl_trades_l4/*.parquet /tmp/shards/
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin flow-data >/dev/null 2>&1; then
            git fetch origin flow-data
            git checkout -B flow-data origin/flow-data
          else
            git checkout --orphan flow-data
            git rm -rf . >/dev/null 2>&1 || true
            echo "# HL per-account flow shards (recorded by record-hl-flow workflow)" > README.md
          fi
          mkdir -p shards
          cp /tmp/shards/*.parquet shards/
          git add shards README.md
          if git diff --staged --quiet; then
            echo "nothing new to commit"
          else
            git commit -m "flow shards $(date -u +%Y-%m-%dT%H:%MZ)"
            git push origin flow-data
          fi
