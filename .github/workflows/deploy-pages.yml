name: Deploy Pages

# Triggers (any of these redeploys the site):
#  - push to main: catches human PR merges and direct commits.
#  - workflow_run on the two crons: catches bot-pushed commits, which the
#    `on: push` event does NOT see (pushes made with the default
#    GITHUB_TOKEN intentionally don't trigger downstream workflows).
#  - workflow_dispatch: manual button in the Actions tab.
on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["PHOENIX Live Signal", "Daily Dashboard Update"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    # Deploy on manual runs, or whenever a triggering cron completed
    # successfully (the crons always commit+push their refresh before exiting).
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'push' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Checkout main
      uses: actions/checkout@v4
      with:
        ref: main

    - name: Configure Pages
      uses: actions/configure-pages@v5

    - name: Upload docs/ artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: docs

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
