name: PHOENIX Live Signal

on:
  schedule:
    # Run at 6:30 PM ET (23:30 UTC) every weekday (30 min after market close)
    - cron: '30 23 * * 1-5'
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        pip install pandas numpy yfinance requests xgboost scikit-learn

    - name: Full PHOENIX refresh
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        PYTHONUNBUFFERED: '1'
      run: |
        python alt/refresh_all.py

    - name: Commit and push
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add data/etfs/ data/fred/ data/results/ docs/phoenix.html
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          git commit -m "PHOENIX refresh: $(date -u +%Y-%m-%d)"
          # Retry push on transient errors
          for i in 1 2 3; do
            git push && break
            echo "Push attempt $i failed, retrying..."
            sleep $((i*2))
          done
        fi
